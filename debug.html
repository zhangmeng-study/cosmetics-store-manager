<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug - 美妆门店管理系统</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .error {
      background: #fee;
      border: 1px solid #fcc;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
    }
    .success {
      background: #efe;
      border: 1px solid #cfc;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
    }
    pre {
      background: #fff;
      padding: 10px;
      border-radius: 3px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>调试信息</h1>
  <div id="output"></div>

  <script>
    const output = document.getElementById('output');
    const logs = [];

    // Capture console errors
    const originalError = console.error;
    console.error = function(...args) {
      logs.push({ type: 'error', message: args.join(' ') });
      originalError.apply(console, args);
    };

    const originalLog = console.log;
    console.log = function(...args) {
      logs.push({ type: 'log', message: args.join(' ') });
      originalLog.apply(console, args);
    };

    // Try to load the main app
    window.addEventListener('error', function(e) {
      logs.push({ 
        type: 'error', 
        message: `${e.message} at ${e.filename}:${e.lineno}:${e.colno}` 
      });
    });

    window.addEventListener('unhandledrejection', function(e) {
      logs.push({ 
        type: 'error', 
        message: `Unhandled rejection: ${e.reason}` 
      });
    });

    // Load React and dependencies
    const scripts = [
      'https://unpkg.com/react@18.3.1/umd/react.development.js',
      'https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js',
      'https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.0/Recharts.min.js'
    ];

    let loadedScripts = 0;
    const totalScripts = scripts.length;

    scripts.forEach((src, index) => {
      const script = document.createElement('script');
      script.src = src;
      script.onload = () => {
        loadedScripts++;
        logs.push({ type: 'success', message: `Loaded: ${src}` });
        if (loadedScripts === totalScripts) {
          checkReact();
        }
      };
      script.onerror = () => {
        logs.push({ type: 'error', message: `Failed to load: ${src}` });
      };
      document.head.appendChild(script);
    });

    function checkReact() {
      setTimeout(() => {
        if (typeof React !== 'undefined') {
          logs.push({ type: 'success', message: 'React is available' });
          if (typeof ReactDOM !== 'undefined') {
            logs.push({ type: 'success', message: 'ReactDOM is available' });
            if (typeof Recharts !== 'undefined') {
              logs.push({ type: 'success', message: 'Recharts is available' });
              tryToRender();
            } else {
              logs.push({ type: 'error', message: 'Recharts is NOT available' });
            }
          } else {
            logs.push({ type: 'error', message: 'ReactDOM is NOT available' });
          }
        } else {
          logs.push({ type: 'error', message: 'React is NOT available' });
        }
        displayLogs();
      }, 1000);
    }

    function tryToRender() {
      try {
        const root = ReactDOM.createRoot(document.createElement('div'));
        logs.push({ type: 'success', message: 'ReactDOM.createRoot works' });
        
        // Try to render a simple component
        root.render(React.createElement('div', null, 'Test render successful'));
        logs.push({ type: 'success', message: 'Simple render works' });
      } catch (e) {
        logs.push({ type: 'error', message: `Render failed: ${e.message}` });
      }
      displayLogs();
    }

    function displayLogs() {
      output.innerHTML = logs.map(log => `
        <div class="${log.type}">
          <strong>${log.type.toUpperCase()}</strong>: ${log.message}
        </div>
      `).join('');
    }

    // Initial display
    displayLogs();
  </script>
</body>
</html>
